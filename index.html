<!DOCTYPE html>
<html>
<head>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>TaskFlow App</title>

  <style>
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
      margin-bottom: 1000px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
  </style>

</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container-fluid">
      <span class="navbar-brand">TaskFlow</span>

      <div class="d-flex align-items-center">
        <span class="text-white me-3">👤 <strong id="userName"></strong></span>
        <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
      </div>
    </div>
  </nav>
<div class="container mt-10" style="margin-top: 80px;">



  <!-- LOGIN -->
  <div id="auth" class="card p-4 shadow">
    <h3>Login</h3>

    <input class="form-control mb-2" type="text" id="username" placeholder="Usuario">
    <input class="form-control mb-2" type="password" id="password" placeholder="Contraseña">

    <button class="btn btn-primary w-100 mb-2" onclick="login()">Login</button>
    <button class="btn btn-secondary w-100" onclick="register()">Register</button>
  </div>

  <div id="loading" class="text-center my-3" style="display:none;">
    <div class="spinner-border text-primary"></div>
    <p>Cargando...</p>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" style="display:none;">

    <div class="d-flex justify-content-between mb-3">
      <h3>Mis tareas</h3>

    </div>

    <!-- FORM -->
    <div class="card p-3 mb-4 shadow">
      <h5 id="formTitle">Crear tarea</h5>

      <input class="form-control mb-2" id="taskTitle" placeholder="Título">
      <textarea class="form-control mb-2" id="taskDescription" placeholder="Descripción"></textarea>
      <select class="form-select mb-2" id="statusSelect">
        <option value="pending">Pendiente</option>
        <option value="in_progress">En progreso</option>
        <option value="completed">Completada</option>
      </select>
      <!-- CATEGORY -->
      <select class="form-select mb-2" id="categorySelect"></select>

      <!-- TAGS -->
      <div id="tagChips" class="mb-2"></div>
      <button id="submitBtn" class="btn btn-success w-100" onclick="createTask()">Crear</button>
      <button id="cancelEditBtn" class="btn btn-secondary w-100 mt-2" style="display:none;" onclick="cancelEdit()">Nueva tarea</button>
    </div>

    <select class="form-select mb-3" id="statusFilter" onchange="getTasks()">
      <option value="">Todas</option>
      <option value="pending">Pendiente</option>
      <option value="in_progress">En progreso</option>
      <option value="completed">Completada</option>
    </select>
    <!-- TASKS -->
    <ul class="list-group" id="tasks"></ul>

  </div>
</div>

<script>
const API_URL = "https://taskflow-j7kn.onrender.com";

// 🔐 Verificar si hay token al cargar
window.onload = () => {
  const token = localStorage.getItem("token");

  if (token) {
    showDashboard();
    getTasks();
    loadCategories();
    loadTags();
  }
};
let editingTaskId = null;
let selectedTags = [];

function clearForm() {
  document.getElementById("taskTitle").value = "";
  document.getElementById("taskDescription").value = "";
  document.getElementById("categorySelect").selectedIndex = 0;

  // limpiar tags (chips)
  selectedTags = [];

  document.querySelectorAll("#tagChips button").forEach(btn => {
    btn.classList.remove("btn-primary");
    btn.classList.add("btn-outline-primary");
  });
}

function showLoading() {
  document.getElementById("loading").style.display = "block";
}

function hideLoading() {
  document.getElementById("loading").style.display = "none";
}

// 🔑 LOGIN
function login() {
  showLoading();

  fetch(`${API_URL}/api/token/`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username: document.getElementById("username").value,
      password: document.getElementById("password").value
    })
  })
  .then(res => res.json())
  .then(data => {
    if (data.access) {
      localStorage.setItem("token", data.access);
      localStorage.setItem("username", document.getElementById("username").value);

      showDashboard();
      getTasks();
      loadCategories();
      loadTags();
    } else {
      alert("Credenciales incorrectas");
    }
  })
  .catch(() => alert("Error en login"))
  .finally(() => hideLoading()); // 👈 clave
}

// 📝 REGISTRO
function register() {
  showLoading();

  fetch(`${API_URL}/api/register/`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username: document.getElementById("username").value,
      password: document.getElementById("password").value
    })
  })
  .then(res => res.json())
  .then(() => {
    alert("Usuario creado, ahora inicia sesión");
  })
  .catch(() => alert("Error al registrar"))
  .finally(() => hideLoading());
}

// 📋 OBTENER TASKS
function getTasks() {
  showLoading();

  const token = localStorage.getItem("token");
  const status = document.getElementById("statusFilter").value;

  let url = `${API_URL}/api/tasks/`;

  if (status) {
    url += `?status=${status}`;
  }

  fetch(url, {
    headers: {
      "Authorization": "Bearer " + token
    }
  })
  .then(res => res.json())
  .then(data => {
    const list = document.getElementById("tasks");
    list.innerHTML = "";

    data.forEach(task => {
      const li = document.createElement("li");

      li.className = "list-group-item d-flex justify-content-between";

      li.innerHTML = `
        <div class="card w-100 shadow-sm">
          <div class="card-body d-flex justify-content-between align-items-center">

            <div>
              <h5 class="card-title mb-1">${task.title}</h5>
              <p class="card-text text-muted mb-1">${task.description}</p>
              <span class="badge ${getStatusColor(task.status)}">${task.status}</span>
            </div>

            <div>
              <button class="btn btn-sm btn-warning me-2" onclick="startEdit(${task.id})">✏️</button>
              <button class="btn btn-sm btn-danger" onclick="deleteTask(${task.id})">🗑️</button>
            </div>

          </div>
        </div>
      `;

      list.appendChild(li);
    });
    hideLoading();
  });
}

function loadCategories() {
  fetch(`${API_URL}/api/categories/`)
  .then(res => res.json())
  .then(data => {
    const select = document.getElementById("categorySelect");
    select.innerHTML = "";

    data.forEach(cat => {
      const option = document.createElement("option");
      option.value = cat.id;
      option.textContent = cat.name;
      select.appendChild(option);
    });
  });
}

function loadTags() {
  fetch(`${API_URL}/api/tags/`)
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("tagChips");
    container.innerHTML = "";

    data.forEach(tag => {
      const btn = document.createElement("button");
      btn.className = "btn btn-outline-primary m-1";
      btn.dataset.id = tag.id;
      btn.textContent = tag.name;

      btn.onclick = () => {
        const tagId = tag.id;

        if (selectedTags.includes(tagId)) {
          selectedTags = selectedTags.filter(t => t !== tagId);
          btn.classList.remove("btn-primary");
          btn.classList.add("btn-outline-primary");
        } else {
          selectedTags.push(tagId);
          btn.classList.add("btn-primary");
          btn.classList.remove("btn-outline-primary");
        }
      };

      container.appendChild(btn);
    });
  });
}

function startEdit(id) {
  const token = localStorage.getItem("token");

  document.getElementById("formTitle").textContent = "Editar tarea";
  document.getElementById("submitBtn").textContent = "Actualizar";
  document.getElementById("cancelEditBtn").style.display = "block";

  fetch(`${API_URL}/api/tasks/${id}/`, {
    headers: {
      "Authorization": "Bearer " + token
    }
  })
  .then(res => res.json())
  .then(task => {
    editingTaskId = id;

    document.getElementById("taskTitle").value = task.title;
    document.getElementById("taskDescription").value = task.description;
    document.getElementById("categorySelect").value = task.category.id;

    // limpiar selección previa
    selectedTags = [];

    // recorrer botones (chips)
    document.querySelectorAll("#tagChips button").forEach(btn => {
      const tagId = parseInt(btn.dataset.id);

      const isSelected = task.tags.some(t => t.id === tagId);

      if (isSelected) {
        btn.classList.add("btn-primary");
        btn.classList.remove("btn-outline-primary");
        selectedTags.push(tagId);
      } else {
        btn.classList.remove("btn-primary");
        btn.classList.add("btn-outline-primary");
      }
    });

  });
  
}

function cancelEdit() {
  editingTaskId = null;

  clearForm();

  document.getElementById("submitBtn").textContent = "Crear";
  document.getElementById("cancelEditBtn").style.display = "none";
  document.getElementById("formTitle").textContent = "Crear tarea";
}

function createTask() {
  const token = localStorage.getItem("token");
  setButtonLoading(true);
  const categoryId = parseInt(document.getElementById("categorySelect").value);


  const url = editingTaskId
    ? `${API_URL}/api/tasks/${editingTaskId}/`
    : `${API_URL}/api/tasks/`;

  const method = editingTaskId ? "PUT" : "POST";

  fetch(url, {
    method: method,
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({
      title: document.getElementById("taskTitle").value,
      description: document.getElementById("taskDescription").value,
      status: document.getElementById("statusSelect").value,
      category_id: categoryId,
      tag_ids: selectedTags
    })
  })
  .then(() => {
    editingTaskId = null;
    clearForm();
    document.getElementById("submitBtn").textContent = "Crear";
    document.getElementById("cancelEditBtn").style.display = "none";
    document.getElementById("formTitle").textContent = "Crear tarea";
    setButtonLoading(false);
    getTasks();
  });
}

function deleteTask(id) {
  const token = localStorage.getItem("token");

  fetch(`${API_URL}/api/tasks/${id}/`, {
    method: "DELETE",
    headers: {
      "Authorization": "Bearer " + token
    }
  })
  .then(() => {
    getTasks();
  });
}

// 🔄 UI
function showDashboard() {
  document.getElementById("auth").style.display = "none";
  document.getElementById("dashboard").style.display = "block";
  document.getElementById("userName").textContent = localStorage.getItem("username");
}

// 🚪 LOGOUT
function logout() {
  localStorage.removeItem("token");
  location.reload();
}

function getStatusColor(status) {
  if (status === "pending") return "bg-secondary";
  if (status === "in_progress") return "bg-warning";
  if (status === "completed") return "bg-success";
}

function setButtonLoading(isLoading) {
  const btn = document.getElementById("submitBtn");

  if (isLoading) {
    btn.disabled = true;
    btn.textContent = "Guardando...";
  } else {
    btn.disabled = false;
    btn.textContent = editingTaskId ? "Actualizar" : "Crear";
  }
}

</script>

</body>
</html>
